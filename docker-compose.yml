services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: smart_app
      POSTGRES_PASSWORD: smart_app
      POSTGRES_DB: smart_app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smart_app"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      target: prod
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  test:
    build:
      context: .
      target: dev
    environment:
      DATABASE_URL: "sqlite://:memory:"
    command: ["pytest", "tests/", "-q"]
    profiles:
      - ci

  lint:
    build:
      context: .
      target: dev
    command: ["pre-commit", "run", "--all-files"]
    profiles:
      - ci

volumes:
  postgres_data:
