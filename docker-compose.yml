services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: smart_app
      POSTGRES_PASSWORD: smart_app
      POSTGRES_DB: smart_app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smart_app"]
      interval: 5s
      timeout: 5s
      retries: 5

  test:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - .:/app
    environment:
      DATABASE_URL: "sqlite://:memory:"
    command: ["sh", "-c", "pip install -e .[dev] -q && pytest tests/ -q"]
    profiles:
      - ci

  lint:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - .:/app
    command: ["sh", "-c", "pip install pre-commit -q && pre-commit run --all-files"]
    profiles:
      - ci

volumes:
  postgres_data:
